<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 320" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Your App box -->
  <rect x="30" y="80" width="180" height="90" rx="10" fill="#f8fafc" stroke="#334155" stroke-width="2" filter="url(#shadow)"/>
  <text x="120" y="120" text-anchor="middle" font-size="16" font-weight="600" fill="#0f172a">Your App</text>
  <text x="120" y="142" text-anchor="middle" font-size="11" fill="#64748b">uses fake tokens</text>

  <!-- Overbearer Proxy box -->
  <rect x="320" y="80" width="180" height="90" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="410" y="120" text-anchor="middle" font-size="16" font-weight="600" fill="#1e40af">Overbearer</text>
  <text x="410" y="142" text-anchor="middle" font-size="11" fill="#3b82f6">Proxy</text>

  <!-- Target API box -->
  <rect x="610" y="80" width="180" height="90" rx="10" fill="#f8fafc" stroke="#334155" stroke-width="2" filter="url(#shadow)"/>
  <text x="700" y="120" text-anchor="middle" font-size="16" font-weight="600" fill="#0f172a">Target API</text>
  <text x="700" y="142" text-anchor="middle" font-size="11" fill="#64748b">receives real tokens</text>

  <!-- Management Console box -->
  <rect x="340" y="230" width="140" height="60" rx="10" fill="#fefce8" stroke="#ca8a04" stroke-width="2" filter="url(#shadow)"/>
  <text x="410" y="265" text-anchor="middle" font-size="14" font-weight="600" fill="#854d0e">Management</text>

  <!-- Arrow: App → Proxy (top) -->
  <line x1="210" y1="110" x2="316" y2="110" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="263" y="102" text-anchor="middle" font-size="10" fill="#64748b">fake token</text>

  <!-- Arrow: Proxy → App (bottom) -->
  <line x1="320" y1="140" x2="214" y2="140" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="263" y="158" text-anchor="middle" font-size="10" fill="#64748b">response</text>

  <!-- Arrow: Proxy → Target API (top) -->
  <line x1="500" y1="110" x2="606" y2="110" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="553" y="102" text-anchor="middle" font-size="10" fill="#64748b">real token</text>

  <!-- Arrow: Target API → Proxy (bottom) -->
  <line x1="610" y1="140" x2="504" y2="140" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="553" y="158" text-anchor="middle" font-size="10" fill="#64748b">response</text>

  <!-- Arrow: Proxy → Management -->
  <line x1="410" y1="170" x2="410" y2="226" stroke="#ca8a04" stroke-width="1.5" stroke-dasharray="5,4"/>
</svg>
